syntax = "proto3";

package fenris;

enum RequestType {
  PING = 0;
  CREATE_FILE = 1;
  READ_FILE = 2;
  WRITE_FILE = 3;
  APPEND_FILE = 4;
  DELETE_FILE = 5;
  INFO_FILE = 6;
  CREATE_DIR = 7;
  LIST_DIR = 8;
  CHANGE_DIR =9;
  DELETE_DIR = 10;
  UPLOAD_FILE = 11;
  TERMINATE = 12;
  BEGIN_OBJECT_WRITE = 13;
  WRITE_OBJECT_CHUNK = 14;
}

message Request {
  RequestType command = 1;
  string filename = 2;
  uint32 ip_addr = 3;
  bytes data = 4;

  oneof details {
    TransferStart transfer_start = 5;
    TransferChunk transfer_chunk = 6;
  }
}

enum ResponseType {
  PONG = 0;
  FILE_INFO = 1;
  FILE_CONTENT = 2;
  DIR_LISTING = 3;
  SUCCESS = 4;
  ERROR = 5;
  TERMINATED = 6;
  CHANGED_DIR = 7;
  TRANSFER_READY = 8;
  TRANSFER_PROGRESS = 9;
  FILE_CONTENT_CHUNK = 10;
}

message Response {
  ResponseType type = 1;
  bool success = 2;
  string error_message = 3;
  bytes data = 4;

  // Type-specific fields
  oneof details {
    FileInfo file_info = 5;
    DirectoryListing directory_listing = 6;
    TransferAck transfer_ack = 7;
    TransferChunk transfer_chunk = 8;
  }
}

enum TransferMode {
  TRANSFER_MODE_UNSPECIFIED = 0;
  TRANSFER_WRITE = 1;
  TRANSFER_APPEND = 2;
  TRANSFER_UPLOAD = 3;
}

message TransferStart {
  string filename = 1;
  TransferMode mode = 2;
  uint64 total_size = 3;
}

message TransferChunk {
  uint64 offset = 1;
  bytes data = 2;
  bool is_last = 3;
  uint64 total_size = 4;
}

message TransferAck {
  uint64 offset = 1;
  uint32 chunk_size = 2;
}

message FileInfo {
  string name = 1;
  uint64 size = 2;
  bool is_directory = 3;
  uint64 modified_time = 4;
  // Optional: file permissions
  uint32 permissions = 5;
}

message DirectoryListing {
  repeated FileInfo entries = 1;
}
